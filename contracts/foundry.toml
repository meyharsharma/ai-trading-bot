# Foundry config for the optional AgentArtifacts wrapper.
# Run with: `cd contracts && forge build` (and `forge test` once tests exist).
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
sepolia = "https://rpc.sepolia.org"
